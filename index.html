<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripReal AI</title>

<style>
body{
    font-family: sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    text-align:center;
    padding:120px 20px;
    color:white;

    background-image:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
    background-size:cover;
    background-position:center;

    position:relative;
}

header::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

header h1,
header p{
    position:relative;
    z-index:1;
}

.container{
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.result{
    margin-top:30px;
    padding:20px;
    background:#fafafa;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    <h1>TripReal AI</h1>
    <p>AIがあなたに最適な旅行プランを作成</p>
</header>

<div class="container">

    <label>予算</label>
    <select>
        <option>1万円以下</option>
        <option>1〜3万円</option>
        <option>3〜5万円</option>
        <option>5万円以上</option>
    </select>

    <label>日数</label>
    <select>
        <option>日帰り</option>
        <option>1泊2日</option>
        <option>2泊3日</option>
        <option>3泊4日以上</option>
    </select>

    <label>目的</label>
    <select>
        <option>グルメ</option>
        <option>自然</option>
        <option>温泉</option>
        <option>観光名所</option>
        <option>デート</option>
        <option>家族旅行</option>
    </select>

    <label>場所</label>
    <select>
        <option>青森県</option>
        <option>岩手県</option>
        <option>秋田県</option>
        <option>宮城県</option>
        <option>山形県</option>
        <option>福島県</option>
    </select>

    <button>AI旅行プランを作成</button>

    <div class="result">
        <h3>おすすめプラン</h3>
        <p>
        ここにAIが作成した旅行プランを表示します。
        </p>
    </div>

</div>

</body>
</html>
